name: Deploy to Azure

on:
  push:
    branches:
      - main

# 1. This line fixes the Node.js deprecation warning completely
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

permissions:
  id-token: write
  contents: read

jobs:
  azure-sign-in:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. THE TRUTH TELLER: This tests if GitHub actually sees your secrets
      - name: Debug Secrets Presence
        run: |
          echo "=== SECRETS CHECK ==="
          echo -n "Is AZURE_CLIENT_ID populated? "
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ]; then echo "YES"; else echo "NO"; fi
          
          echo -n "Is AZURE_TENANT_ID populated? "
          if [ -n "${{ secrets.AZURE_TENANT_ID }}" ]; then echo "YES"; else echo "NO"; fi
          
          echo -n "Is AZURE_SUBSCRIPTION_ID populated? "
          if [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then echo "YES"; else echo "NO"; fi
          echo "====================="

      # 3. Try the login
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 4. Verification
      - name: Verify Azure Connection
        run: |
          az account show --output table
