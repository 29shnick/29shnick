# 1. Authenticate with Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 2. AUTOMATED WAKE UP: Turn the app on if it's stopped
      - name: Ensure App Service is Running
        run: |
          echo "Waking up the web app..."
          az webapp start --name 29shnick-prod --resource-group 29shnick-prod_group

      # 3. Deploy Web App (This will now succeed)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: '29shnick-prod'
